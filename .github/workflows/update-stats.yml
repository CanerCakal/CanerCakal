name: Update GitHub Stats Card

on:
  schedule:
    # Her Pazartesi 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:  # Actions sekmesinden elle tetikleme

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate stats.svg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
          OUT_PATH: assets/stats.svg
        run: python scripts/update_stats.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet assets/stats.svg; then
            git add assets/stats.svg
            git commit -m "chore: weekly stats update"
            git push
          else
            echo "No changes to stats."
          fi
