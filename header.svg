<svg width="900" height="420" viewBox="0 0 900 420" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="-apple-system, SF Pro Display, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <!-- Background gradient: deep space navy -->
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="0.55" stop-color="#0d1424"/>
      <stop offset="1" stop-color="#0a0f1d"/>
    </linearGradient>
    <!-- Swift orange -> iOS blue accent -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F05138"/>
      <stop offset="1" stop-color="#0A84FF"/>
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A84FF"/>
      <stop offset="1" stop-color="#5E5CE6"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0A84FF" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="#5E5CE6" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="card"><rect x="1" y="1" width="898" height="418" rx="22"/></clipPath>
  </defs>

  <!-- Card -->
  <rect x="1" y="1" width="898" height="418" rx="22" fill="url(#bg)" stroke="#1c2740" stroke-width="1.5"/>

  <g clip-path="url(#card)">
    <!-- faint grid -->
    <g stroke="#141e33" stroke-width="1">
      <line x1="0" y1="70" x2="900" y2="70"/><line x1="0" y1="140" x2="900" y2="140"/>
      <line x1="0" y1="210" x2="900" y2="210"/><line x1="0" y1="280" x2="900" y2="280"/>
      <line x1="0" y1="350" x2="900" y2="350"/>
      <line x1="150" y1="0" x2="150" y2="420"/><line x1="300" y1="0" x2="300" y2="420"/>
      <line x1="450" y1="0" x2="450" y2="420"/><line x1="600" y1="0" x2="600" y2="420"/>
      <line x1="750" y1="0" x2="750" y2="420"/>
    </g>
    <!-- ambient glows -->
    <circle cx="230" cy="230" r="180" fill="url(#orbGlow)"/>
    <circle cx="820" cy="60" r="120" fill="url(#orbGlow)" opacity="0.5"/>

    <!-- ================= LEFT: iOS device mockup ================= -->
    <g transform="translate(70,95)">
      <!-- outer glow ring, slowly rotating -->
      <circle cx="115" cy="115" r="105" fill="none" stroke="#0A84FF" stroke-width="1" stroke-dasharray="4 8" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0 115 115" to="360 115 115" dur="24s" repeatCount="indefinite"/>
      </circle>
      <!-- iPhone body -->
      <rect x="55" y="20" width="120" height="190" rx="26" fill="#05070d" stroke="#243554" stroke-width="2"/>
      <!-- screen -->
      <rect x="63" y="28" width="104" height="174" rx="20" fill="#0b1020"/>
      <!-- notch / dynamic island -->
      <rect x="97" y="36" width="36" height="9" rx="4.5" fill="#05070d"/>
      <!-- Swift bird glyph (simplified) in the screen -->
      <g transform="translate(96,78) scale(0.72)">
        <path d="M6 44 C6 44 2 30 14 18 C26 6 44 4 44 4 C44 4 40 16 34 22 C40 20 46 22 46 22 C46 22 40 34 26 38 C34 38 40 36 40 36 C40 36 30 48 14 46 C10 46 6 44 6 44 Z" fill="url(#accent)">
          <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
        </path>
      </g>
      <!-- app dots -->
      <g>
        <rect x="78" y="150" width="16" height="16" rx="5" fill="#F05138" opacity="0.9"/>
        <rect x="102" y="150" width="16" height="16" rx="5" fill="#0A84FF" opacity="0.9"/>
        <rect x="126" y="150" width="16" height="16" rx="5" fill="#5E5CE6" opacity="0.9"/>
      </g>
      <!-- scanning line -->
      <rect x="63" y="28" width="104" height="2.5" fill="#0A84FF" opacity="0.8">
        <animate attributeName="y" values="30;198;30" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.1;0.9;0.1" dur="5s" repeatCount="indefinite"/>
      </rect>
      <!-- status dot -->
      <circle cx="205" cy="55" r="5" fill="#30D158"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></circle>
    </g>

    <!-- ================= RIGHT: terminal-style info ================= -->
    <g transform="translate(320,60)">
      <!-- window controls -->
      <circle cx="8" cy="8" r="7" fill="#FF5F57"/>
      <circle cx="30" cy="8" r="7" fill="#FEBC2E"/>
      <circle cx="52" cy="8" r="7" fill="#28C840"/>

      <!-- name -->
      <text x="0" y="62" fill="#ffffff" font-size="38" font-weight="800">Hi, I'm Caner <tspan fill="#FEBC2E">👋</tspan></text>

      <!-- role with cursor -->
      <text x="2" y="100" fill="url(#blueGlow)" font-size="21" font-weight="700">iOS Developer Candidate</text>
      <rect x="270" y="84" width="4" height="20" fill="#0A84FF">
        <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>

      <!-- divider -->
      <line x1="0" y1="120" x2="500" y2="120" stroke="#1c2740" stroke-width="1"/>

      <!-- info rows -->
      <g font-size="15">
        <text x="0" y="152" fill="#5a6b8c" font-weight="600">◆  About</text>
        <text x="120" y="152" fill="#e6edf7" font-weight="500">Computer Engineering Student</text>

        <text x="0" y="182" fill="#5a6b8c" font-weight="600">◆  Focus</text>
        <text x="120" y="182" fill="#e6edf7" font-weight="500">Swift / iOS · Clean architecture</text>

        <text x="0" y="212" fill="#5a6b8c" font-weight="600">◆  Also</text>
        <text x="120" y="212" fill="#e6edf7" font-weight="500">Unity (C#) game dev · RAG</text>

        <text x="0" y="242" fill="#5a6b8c" font-weight="600">◆  Writes</text>
        <text x="120" y="242" fill="#0A84FF" font-weight="500">medium.com/@canercakalofficial</text>
      </g>

      <!-- chips -->
      <g font-size="13" font-weight="600">
        <g transform="translate(0,268)">
          <rect x="0" y="0" width="66" height="30" rx="15" fill="#12203a" stroke="#F05138" stroke-width="1"/>
          <text x="33" y="20" fill="#ff8a75" text-anchor="middle">Swift</text>
        </g>
        <g transform="translate(74,268)">
          <rect x="0" y="0" width="86" height="30" rx="15" fill="#12203a" stroke="#243554" stroke-width="1"/>
          <text x="43" y="20" fill="#c7d3e8" text-anchor="middle">SwiftUI</text>
        </g>
        <g transform="translate(168,268)">
          <rect x="0" y="0" width="56" height="30" rx="15" fill="#12203a" stroke="#243554" stroke-width="1"/>
          <text x="28" y="20" fill="#c7d3e8" text-anchor="middle">C#</text>
        </g>
        <g transform="translate(232,268)">
          <rect x="0" y="0" width="72" height="30" rx="15" fill="#12203a" stroke="#243554" stroke-width="1"/>
          <text x="36" y="20" fill="#c7d3e8" text-anchor="middle">Unity</text>
        </g>
        <g transform="translate(312,268)">
          <rect x="0" y="0" width="72" height="30" rx="15" fill="#12203a" stroke="#243554" stroke-width="1"/>
          <text x="36" y="20" fill="#c7d3e8" text-anchor="middle">Python</text>
        </g>
      </g>
    </g>

    <!-- bottom accent line -->
    <rect x="1" y="416" width="898" height="3" fill="url(#accent)"/>
  </g>
</svg>
